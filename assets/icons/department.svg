<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="dept-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1E40AF" />
    </linearGradient>
    <filter id="dept-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2563EB" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Workstation screen backplate -->
  <rect x="6" y="8" width="36" height="24" rx="3" fill="url(#dept-grad)" stroke="#60A5FA" stroke-width="2" filter="url(#dept-glow)" />
  <!-- Screen glass bezel line -->
  <rect x="8" y="10" width="32" height="17" rx="1" fill="#1E3A8A" opacity="0.4" />
  <!-- Workstation stand -->
  <path d="M 20,32 L 28,32 L 30,39 L 18,39 Z" fill="#1D4ED8" stroke="#60A5FA" stroke-width="2" />
  <!-- Base plate -->
  <rect x="14" y="38" width="20" height="3" rx="1.5" fill="#3B82F6" />
  <!-- Inside screen detail: Terminal bracket & Cursor representing user host -->
  <path d="M 12,14 L 15,17 L 12,20" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <line x1="17" y1="20" x2="23" y2="20" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />
</svg>
