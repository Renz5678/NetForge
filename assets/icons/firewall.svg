<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="fw-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EA580C" />
      <stop offset="100%" stop-color="#9A3412" />
    </linearGradient>
    <filter id="fw-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#EA580C" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Firewall background grid (brick representation) -->
  <rect x="6" y="6" width="36" height="36" rx="6" fill="url(#fw-grad)" stroke="#FB923C" stroke-width="2" filter="url(#fw-glow)" />
  <!-- Brick Line Dividers -->
  <!-- Horizontal -->
  <line x1="6" y1="18" x2="42" y2="18" stroke="#FB923C" stroke-width="1.5" />
  <line x1="6" y1="30" x2="42" y2="30" stroke="#FB923C" stroke-width="1.5" />
  <!-- Vertical Staggered -->
  <line x1="18" y1="6" x2="18" y2="18" stroke="#FB923C" stroke-width="1.5" />
  <line x1="30" y1="6" x2="30" y2="18" stroke="#FB923C" stroke-width="1.5" />
  <line x1="12" y1="18" x2="12" y2="30" stroke="#FB923C" stroke-width="1.5" />
  <line x1="24" y1="18" x2="24" y2="30" stroke="#FB923C" stroke-width="1.5" />
  <line x1="36" y1="18" x2="36" y2="30" stroke="#FB923C" stroke-width="1.5" />
  <line x1="18" y1="30" x2="18" y2="42" stroke="#FB923C" stroke-width="1.5" />
  <line x1="30" y1="30" x2="30" y2="42" stroke="#FB923C" stroke-width="1.5" />
  <!-- Center Shield/Security Indicator Overlay -->
  <path d="M 24,14 L 32,17 L 32,24 C 32,29.5 28.5,33.5 24,35 C 19.5,33.5 16,29.5 16,24 L 16,17 Z" fill="#FFFFFF" opacity="0.9" />
  <path d="M 24,17 L 30,19.5 L 30,24 C 30,28.5 27.5,31.8 24,33 C 20.5,31.8 18,28.5 18,24 L 18,19.5 Z" fill="#EA580C" />
  <!-- Flame/Keyhole inside Shield -->
  <circle cx="24" cy="24" r="2.5" fill="#FFFFFF" />
  <path d="M 22.5,24 L 25.5,24 L 26,29 L 22,29 Z" fill="#FFFFFF" />
</svg>
